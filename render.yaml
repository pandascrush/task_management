services:
  # Backend Web Service
  - type: web
    name: task-flow-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm run build
    startCommand: npm run db:migrate:prod && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: task-flow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  # PostgreSQL Database
  - name: task-flow-db
    plan: free
    databaseName: taskflow
    user: admin
